on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read

concurrency:
  group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      checks: read
    steps:
      - name: Gate on R-CMD-check for release/workflow_dispatch events
        if: >
          github.event_name != 'workflow_run' &&
          github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONCLUSION=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
            --jq '([.check_runs[] | select(.name | startswith("R-CMD-check")) | .conclusion] | if length == 0 then false else all(. == "success") end)')
          if [ "$CONCLUSION" != "true" ]; then
            echo "R-CMD-check not passing (conclusion: ${CONCLUSION:-none}). Refusing to deploy docs (closes rrlmgraph#104)."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: r-lib/actions/setup-pandoc@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2

      - uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2
        with:
          extra-packages: any::pkgdown, any::magick, any::devtools, local::.
          needs: website

      - name: Document
        run: Rscript -e 'devtools::document()'

      - name: Build favicons
        run: pkgdown::build_favicons(overwrite = TRUE)
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: >
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_run' ||
           github.event.workflow_run.conclusion == 'success')
        uses: JamesIves/github-pages-deploy-action@65b5dfd4f5bcd3a7403bbc2959c144256167464e # v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
