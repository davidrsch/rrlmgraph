on:
  workflow_run:
    workflows: ["R-CMD-check"]
    types: [completed]
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read

concurrency:
  group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      checks: read
    steps:
      - name: Gate on R-CMD-check for release/workflow_dispatch events
        if: >
          github.event_name != 'workflow_run' &&
          github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONCLUSION=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
            --jq '([.check_runs[] | select(.name | startswith("R-CMD-check")) | .conclusion] | if length == 0 then false else all(. == "success") end)')
          if [ "$CONCLUSION" != "true" ]; then
            echo "R-CMD-check not passing (conclusion: ${CONCLUSION:-none}). Refusing to deploy docs (closes rrlmgraph#104)."
            exit 1
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: r-lib/actions/setup-pandoc@v2 # v2

      - uses: r-lib/actions/setup-r@v2 # v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2 # v2
        with:
          extra-packages: any::pkgdown, any::magick, any::devtools, local::.
          needs: website

      - name: Document
        run: Rscript -e 'devtools::document()'

      - name: Build favicons
        run: pkgdown::build_favicons(overwrite = TRUE)
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: >
          github.event_name != 'pull_request' &&
          (github.event_name != 'workflow_run' ||
           github.event.workflow_run.conclusion == 'success')
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
