# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
#
# Slash commands for PR maintainers:
#   /document  -- re-run devtools::document() and push updated man/ + NAMESPACE
#   /style     -- format with air and push the result
on:
    issue_comment:
        types: [created]

name: pr-commands.yaml

concurrency:
    group: ${{ github.workflow }}-${{ github.event.issue.number }}
    cancel-in-progress: true # cancel stale /document or /style runs for the same PR (closes rrlmgraph#105)

permissions: {}

jobs:
    document:
        if: >
            github.event.issue.pull_request &&
            (github.event.comment.author_association == 'MEMBER' ||
             github.event.comment.author_association == 'OWNER') &&
            startsWith(github.event.comment.body, '/document')
        name: document
        runs-on: ubuntu-latest
        env:
            GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - uses: r-lib/actions/pr-fetch@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - uses: r-lib/actions/setup-r@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2
              with:
                  use-public-rspm: true

            - uses: r-lib/actions/setup-r-dependencies@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2
              with:
                  extra-packages: any::devtools
                  needs: pr-document

            - name: Document
              shell: Rscript {0}
              run: devtools::document()

            - name: Commit
              run: |
                  git config --local user.name "$GITHUB_ACTOR"
                  git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
                  git add man/* NAMESPACE
                  git commit -m 'Document' || echo "No changes to commit"

            - uses: r-lib/actions/pr-push@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

    style:
        if: >
            github.event.issue.pull_request &&
            (github.event.comment.author_association == 'MEMBER' ||
             github.event.comment.author_association == 'OWNER') &&
            startsWith(github.event.comment.body, '/style')
        name: style
        runs-on: ubuntu-latest
        env:
            GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - uses: r-lib/actions/pr-fetch@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            - name: Install air
              uses: posit-dev/setup-air@63e80dedb6d275c94a3841e15e5ff8691e1ab237 # v1

            - name: Format
              run: air format .

            - name: Commit changes
              run: |
                  git config --local user.name "$GITHUB_ACTOR"
                  git config --local user.email "$GITHUB_ACTOR@users.noreply.github.com"
                  git commit -am 'Format with air' || echo "No changes to commit"

            - uses: r-lib/actions/pr-push@6f6e5bc62fba3a704f74e7ad7ef7676c5c6a2590 # v2
              with:
                  repo-token: ${{ secrets.GITHUB_TOKEN }}
