# Using `pull_request` so format suggestions run in the unprivileged PR context.
# The previous `pull_request_target` + checkout of pull_request.head.sha was
# a pwn-request: fork code was executed with a GITHUB_TOKEN that had
# pull-requests:write scope.  `pull_request` restricts secrets/token scope
# to read-only for fork PRs, which is sufficient for reviewdog suggestions
# on non-fork PRs; fork PRs will not receive inline suggestions but will
# receive a check-run status, which is an acceptable trade-off (rrlmgraph#87).
# push trigger added so direct commits to main also fail the check.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

name: format-suggest.yaml

permissions: {} # deny-all at workflow level; grant per-job below

concurrency:
  group: format-suggest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-suggest:
    name: format-suggest
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # On pull_request check out the head commit; on push the default is correct.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install air
        uses: posit-dev/setup-air@63e80dedb6d275c94a3841e15e5ff8691e1ab237 # v1

      - name: Format
        run: air format .

      # On direct pushes to main there is no PR to comment on, so just fail
      # the job if air changed anything.
      - name: Fail if not formatted (push)
        if: github.event_name == 'push'
        run: |
          git diff --name-only
          git diff --exit-code

      # On pull requests post inline suggestions via reviewdog.
      - name: Suggest (pull_request)
        if: github.event_name == 'pull_request'
        uses: reviewdog/action-suggester@aa38384ceb608d00f84b4690cacc83a5aba307ff # v1
        with:
          level: error
          fail_level: error
          tool_name: air
          reviewdog_version: latest
