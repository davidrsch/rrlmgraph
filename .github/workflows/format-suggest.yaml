# Using `pull_request` so format runs in the unprivileged PR context.
# The previous `pull_request_target` + checkout of pull_request.head.sha was
# a pwn-request: fork code was executed with a GITHUB_TOKEN that had
# pull-requests:write scope.  `pull_request` restricts secrets/token scope
# to read-only for fork PRs, which is sufficient for reviewdog suggestions
# on non-fork PRs; fork PRs will not receive inline suggestions but will
# receive a check-run status, which is an acceptable trade-off (rrlmgraph#87).
on:
  pull_request:
    branches: [main, master]

name: format-suggest.yaml

jobs:
  format-suggest:
    name: format-suggest
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install air
        uses: posit-dev/setup-air@v1

      - name: Format
        run: air format .

      - name: Suggest
        uses: reviewdog/action-suggester@v1
        with:
          level: error
          fail_level: error
          tool_name: air
          reviewdog_version: latest
